# --- [ HPPC: 守夜人誓言卷轴 (环境配置模板) ] ---
# [守夜人誓言] 警告：此卷轴由守夜人总司令官 (install.sh) 自动刻录。
# 任何手动篡改若未经验证，可能导致绝境长城的防御阵列 (HomeProxy) 彻底瘫痪。

# ==========================================
# Category A: 核心基础设施路径 (严格工程约束)
# ==========================================
DIR_BASE="/usr/share/hppc"
DIR_CORE="${DIR_BASE}/core"
DIR_MODULES="${DIR_BASE}/modules"
DIR_TEMPLATES="${DIR_BASE}/templates"
DIR_TMP="/tmp/hppc"

FILE_CONF_PROD="/etc/config/homeproxy"
FILE_LOCK="/var/run/hppc.lock"

# ==========================================
# Category A: 系统行为控制开关
# ==========================================
# 控制配置落地后的生效策略
# 0: 仅生成并校验配置，由指挥官手动重启 (默认，最安全) 
# 1: 校验通过后自动执行 /etc/init.d/homeproxy reload
SETTING_AUTO_RELOAD=0

# 控制对外补给线的加密严格度
# 0: 严格校验 TLS 证书 (默认，防止学士信件被异鬼掉包) 
# 1: 弱校验模式 (跳过证书验证，仅在极度恶劣的网络环境下开启)
SETTING_INSECURE_SKIP_VERIFY=0

# ==========================================
# 外部依赖配置 (联络信标)
# ==========================================
# [1] 铁金库 (GitHub) - 战略物资补给线
GH_RAW_URL=""

# [2] 学城中枢 (Worker) - 异鬼动态监听与节点调度
CF_DOMAIN=""
CF_TOKEN=""

# [3] 渡鸦网络 (Telegram) - 战报与预警信使
TG_BOT_TOKEN=""
TG_CHAT_ID=""

# [4] 驻地代号 - 烽火台标识
LOCATION=""

# [5] 私有军械库 (Assets) - 瓦雷利亚钢剑私有锻造厂
# 自建规则集 GitHub Raw 地址，用于优先下载
ASSETS_PRIVATE_REPO=""
