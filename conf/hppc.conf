#!/bin/sh
# --- [ HPPC: Castellan Dashboard v3.6 Integrated ] ---
# 修复: 移除 WebUI 中显示 undefined 的无效标题项，全面转换为 POSIX 标准语法
# 新增: 交互式系统参数配置面板 (Config Manager)
# 新增: P1级全局互斥锁 (flock)，防止与 Daemon 后台巡检产生并发冲突踩踏配置

source /etc/hppc/hppc.conf
source /usr/share/hppc/lib/utils.sh

# ==========================================
# 并发控制模块 (Mutex Lock)
# ==========================================
execute_locked() {
    local lock_file="/var/run/hppc_main.lock"
    (
        # 尝试获取排他锁 (非阻塞模式)，失败则拦截
        if ! flock -n 200; then
            echo -e "\n${C_ERR}⚠️ 锁占用拦截: 另一项任务 (如后台巡检同步) 正在执行。${C_RESET}"
            echo -e "${C_INFO}为防止配置踩踏损坏，请等待十几秒后再试。${C_RESET}"
            exit 1
        fi
        # 获取到锁，执行传入的命令串
        eval "$@"
    ) 200>"$lock_file"
}

# ==========================================
# 诊断与系统控制模块
# ==========================================
run_doctor() {
    echo -e "\n🩺 \033[1;33m正在进行要塞诊断 (System Doctor)...\033[0m"
    echo "-------------------------------------"
    check_item() { if eval "$2"; then echo -e "  ✅ $1"; else echo -e "  ❌ $1"; fi }
    
    check_item "网络连通 (GitHub)" "curl -kIs https://api.github.com | grep '200' >/dev/null"
    check_item "信使 (curl)" "command -v curl >/dev/null"
    check_item "翻译官 (jq)" "command -v jq >/dev/null"
    check_item "配置文件" "[ -f /etc/hppc/hppc.conf ] && [ -n '$CF_TOKEN' ]"
    check_item "规则目录" "[ -d /etc/homeproxy/ruleset ]"
    check_item "运行状态" "/etc/init.d/homeproxy status 2>/dev/null | grep -q 'running'"
    echo "-------------------------------------"
    echo "诊断完成。若有 ❌，请检查网络或执行 'u' 升级修复。"
}

run_uninstall() {
    echo -e "\n${C_ERR}⚠️  危险操作：您确定要拆除 HPPC Castellan 系统吗？${C_RESET}"
    echo -e "   这将删除所有脚本、配置、Cron 任务及 WebUI 入口。"
    printf "   确认拆除? [y/N]: "
    read -r confirm
    if [ "$confirm" = "y" ] || [ "$confirm" = "Y" ]; then
        echo "执行焦土战术..."
        # 清理所有注册过的 UCI 节点
        uci delete luci.hppc_group 2>/dev/null
        uci delete luci.hppc_sync 2>/dev/null
        uci delete luci.hppc_assets 2>/dev/null
        uci delete luci.hppc_rollback 2>/dev/null
        uci delete luci.hppc_doctor 2>/dev/null
        uci commit luci
        
        (crontab -l 2>/dev/null | grep -v "hppc" | grep -v "daemon.sh" | grep -v "assets.sh") | crontab -
        rm -rf /usr/share/hppc /etc/hppc /usr/bin/hppc /tmp/hp_*
        echo -e "${C_OK}✅ 拆除完毕。江湖路远，有缘再见。${C_RESET}"
        exit 0
    else
        echo "操作取消。"
    fi
}

setup_webui() {
    echo -e "\n🌐 \033[1;33m正在部署 WebUI 指挥台...\033[0m"
    if ! opkg list-installed | grep -q luci-app-commands; then
        echo "正在安装 luci-app-commands..."
        opkg update && opkg install luci-app-commands
    fi

    # 主动删除之前的 bug 标题项 (undefined)
    uci delete luci.hppc_group 2>/dev/null

    # 重新注册有效命令
    uci set luci.hppc_sync=command
    uci set luci.hppc_sync.name='⚔️ 集结军队 (Sync Config)'
    uci set luci.hppc_sync.command='/usr/bin/hppc sync'

    uci set luci.hppc_assets=command
    uci set luci.hppc_assets.name='📚 修缮典籍 (Update Rules)'
    uci set luci.hppc_assets.command='/usr/bin/hppc assets'

    uci set luci.hppc_rollback=command
    uci set luci.hppc_rollback.name='🛡️ 紧急回滚 (Rollback)'
    uci set luci.hppc_rollback.command='/usr/bin/hppc rollback'
    
    uci set luci.hppc_doctor=command
    uci set luci.hppc_doctor.name='🩺 要塞诊断 (System Doctor)'
    uci set luci.hppc_doctor.command='/usr/bin/hppc doctor'

    uci commit luci
    
    # 刷新 LuCI 缓存
    echo "正在刷新 LuCI 缓存..."
    rm -rf /tmp/luci-indexcache
    rm -rf /tmp/luci-modulecache/
    /etc/init.d/rpcd restart >/dev/null 2>&1 
    
    echo -e "${C_OK}✅ 部署完成！请刷新 LuCI 页面。${C_RESET}"
}

# ==========================================
# 系统参数配置模块 (Config Manager)
# ==========================================
update_config_key() {
    local key="$1"
    local name="$2"
    local conf_file="/etc/hppc/hppc.conf"
    
    # 获取当前内存中的变量值
    local current_val=$(eval echo "\$$key")

    echo -e "\n🔧 正在修改参数: \033[36m$name\033[0m ($key)"
    echo -e "当前设定值: \033[33m${current_val:-未配置}\033[0m"
    printf "请输入新值 (直接回车放弃修改，输入 'clear' 清空此项): "
    read -r new_val

    if [ -z "$new_val" ]; then
        echo ">> 操作取消，值未改变。"
        return
    elif [ "$new_val" = "clear" ]; then
        new_val=""
    fi

    # 强制进行输入清洗：剔除潜在的破坏性单引号
    new_val=$(echo "$new_val" | sed "s/'//g")

    if grep -q "^${key}=" "$conf_file"; then
        sed "s|^${key}=.*|${key}='${new_val}'|" "$conf_file" > "${conf_file}.tmp"
        mv "${conf_file}.tmp" "$conf_file"
    else
        echo "${key}='${new_val}'" >> "$conf_file"
    fi

    echo -e "\033[32m✅ 参数已成功更新。\033[0m"
    source "$conf_file"
}

menu_settings() {
    while true; do
        source /etc/hppc/hppc.conf
        clear
        echo -e "\n========================================="
        echo -e "           ⚙️ 系统参数配置面板           "
        echo -e "========================================="
        echo -e " 1) 节点展示名称 (LOCATION) : \033[32m${LOCATION}\033[0m"
        echo -e " 2) 私有规则源库 (ASSETS)   : \033[32m${ASSETS_PRIVATE_REPO:-未设置}\033[0m"
        echo -e " 3) Worker 代理域 (CF_DOMAIN): \033[32m${CF_DOMAIN}\033[0m"
        echo -e " 4) 节点拉取验证码 (CF_TOKEN) : \033[32m${CF_TOKEN}\033[0m"
        echo -e " 5) TG 机器人密钥 (BOT_TOKEN): \033[32m${TG_BOT_TOKEN:-未设置}\033[0m"
        echo -e " 6) TG 接收者编号 (CHAT_ID)  : \033[32m${TG_CHAT_ID:-未设置}\033[0m"
        echo -e " 0) 返回主菜单"
        echo -e "========================================="
        printf "请输入序号选择要修改的参数 [0-6]: "
        read -r choice

        case "$choice" in
            1) update_config_key "LOCATION" "节点展示名称" ;;
            2) update_config_key "ASSETS_PRIVATE_REPO" "私有规则源仓库 URL" ;;
            3) update_config_key "CF_DOMAIN" "Cloudflare Worker 代理域名" ;;
            4) update_config_key "CF_TOKEN" "节点拉取验证码" ;;
            5) update_config_key "TG_BOT_TOKEN" "Telegram Bot Token" ;;
            6) update_config_key "TG_CHAT_ID" "Telegram 接收频道 ID" ;;
            0) break ;;
            *) echo -e "\033[31m❌ 无效的选择。\033[0m"; sleep 1 ;;
        esac
    done
}

# 提取交互逻辑封装给锁使用
do_assets_interactive() {
    sh /usr/share/hppc/modules/assets.sh --update
    echo ""
    echo -e "${C_WARN}规则集更新已完成。${C_RESET}"
    printf "是否立即重启 HomeProxy 以应用新规则? [y/N]: "
    read -r confirm
    if [ "$confirm" = "y" ] || [ "$confirm" = "Y" ]; then
        log_info "正在重启 HomeProxy..."
        if /etc/init.d/homeproxy restart; then
            echo -e "${C_OK}✅ 重启完毕。${C_RESET}"
        else
            echo -e "${C_ERR}❌ 重启失败！服务可能无法启动。${C_RESET}"
            printf "${C_WARN}是否立即执行紧急回滚 (Rollback)? [y/N]: ${C_RESET}"
            read -r rb_confirm
            if [ "$rb_confirm" = "y" ] || [ "$rb_confirm" = "Y" ]; then
                echo ""
                sh /usr/share/hppc/core/rollback.sh
            fi
        fi
    else
        echo "已跳过重启。"
    fi
}

# ==========================================
# 主界面与路由
# ==========================================
show_menu() {
    clear
    TICK=$(cat /etc/hppc/last_tick 2>/dev/null || echo "Unknown")
    NODE_COUNT=$(grep "config node" /etc/config/homeproxy 2>/dev/null | wc -l)
    STATUS=$(/etc/init.d/homeproxy status 2>/dev/null | grep -q "running" && echo -e "${C_OK}运行中${C_RESET}" || echo -e "${C_ERR}已停止${C_RESET}")
    
    echo -e "${C_INFO}=========================================${C_RESET}"
    echo -e "   🐺 \033[1mHPPC Castellan - 要塞指挥系统\033[0m"
    echo -e "${C_INFO}=========================================${C_RESET}"
    echo -e "   📍 驻地: ${C_WARN}$LOCATION${C_RESET}     🟢 状态: $STATUS"
    echo -e "   📜 密令: ${C_INFO}$TICK${C_RESET}     🌍 节点: ${C_OK}$NODE_COUNT${C_RESET}"
    echo -e "${C_INFO}-----------------------------------------${C_RESET}"
    echo ""
    echo -e "  1) ⚔️  ${C_OK}集结军队 (Muster)${C_RESET}"
    echo -e "     - 拉取配置，检查依赖，重铸防线。"
    echo ""
    echo -e "  2) 📚 ${C_WARN}修缮典籍 (Update Rules)${C_RESET}"
    echo -e "     - 更新规则集 (含 TG 通知)。"
    echo ""
    echo -e "  3) 📥 ${C_INFO}征收物资 (Download Rule)${C_RESET}"
    echo -e "     - 手动下载指定规则 (GeoIP/Geosite)。"
    echo ""
    echo -e "  4) 🛡️  ${C_ERR}死守城池 (Rollback)${C_RESET}"
    echo -e "     - 紧急回滚至上一次的稳定配置。"
    echo ""
    echo -e "  5) 🩺 ${C_INFO}要塞诊断 (Doctor)${C_RESET}"
    echo -e "     - 检查环境健康度。"
    echo ""
    echo -e "  6) 🌐 ${C_OK}部署 WebUI (LuCI Integration)${C_RESET}"
    echo -e "     - 将 HPPC 命令注册到网页后台。"
    echo ""
    echo -e "  7) ⚙️  ${C_WARN}参数配置 (Settings)${C_RESET}"
    echo -e "     - 修改节点名称、Token 密钥、TG 通知等参数。"
    echo ""
    echo -e "-----------------------------------------"
    echo -e "  x) ❌ 拆除要塞    u) 🆙 升级脚本    q) 👋 离开"
    echo ""
    printf "  ⚔️  请领主下令: "
}

# 命令行直达路由 (附带并发锁控制)
case "$1" in
    sync)     execute_locked "sh /usr/share/hppc/core/fetch.sh && sh /usr/share/hppc/core/synthesize.sh"; exit 0 ;;
    assets)   execute_locked "sh /usr/share/hppc/modules/assets.sh --update"; exit 0 ;;
    rollback) execute_locked "sh /usr/share/hppc/core/rollback.sh"; exit 0 ;;
    doctor)   run_doctor; exit 0 ;;
    uninstall) run_uninstall; exit 0 ;;
esac

# 交互式菜单循环
while true; do
    show_menu
    read -r choice
    case $choice in
        1) 
           echo ""
           log_info "吹响集结号角..."
           execute_locked "sh /usr/share/hppc/core/fetch.sh && sh /usr/share/hppc/core/synthesize.sh"
           echo ""; printf "按回车返回..."; read -r dummy 
           ;;
        
        2) 
           echo ""
           log_info "开始修缮典籍 (手动模式)..."
           execute_locked "do_assets_interactive"
           echo ""; printf "按回车返回..."; read -r dummy 
           ;;
        
        3) 
           echo ""
           echo -e "${C_INFO}请输入规则集名称 (必须包含前缀):${C_RESET}"
           echo -e "示例: ${C_WARN}geosite-openai${C_RESET} 或 ${C_WARN}geoip-netflix${C_RESET}"
           printf "输入: "
           read -r rule_name
           if [ -n "$rule_name" ]; then
               execute_locked "sh /usr/share/hppc/modules/assets.sh --download '$rule_name'"
           fi
           echo ""; printf "按回车返回..."; read -r dummy 
           ;;
           
        4) 
           echo ""
           log_warn "执行焦土战术..."
           execute_locked "sh /usr/share/hppc/core/rollback.sh"
           echo ""; printf "按回车返回..."; read -r dummy 
           ;;
           
        5) run_doctor; echo ""; printf "按回车返回..."; read -r dummy ;;
        6) setup_webui; echo ""; printf "按回车返回..."; read -r dummy ;;
        7) menu_settings ;;
        
        x) run_uninstall ;;
        u) echo ""; log_info "重新打造兵器..."; wget -qO /tmp/install.sh "$GH_RAW_URL/install.sh" && sh /tmp/install.sh; echo ""; printf "按回车返回..."; read -r dummy ;;
        q) clear; exit 0 ;;
        *) echo "无效指令"; sleep 1 ;;
    esac
done
